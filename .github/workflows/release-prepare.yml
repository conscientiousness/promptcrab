name: Release (publish)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require tag on main HEAD
        shell: bash
        run: |
          git fetch --no-tags origin main
          MAIN_SHA="$(git rev-parse origin/main)"

          if [[ "$GITHUB_SHA" != "$MAIN_SHA" ]]; then
            echo "Release tag must point to the current origin/main HEAD"
            echo "tag commit:  $GITHUB_SHA"
            echo "main head:   $MAIN_SHA"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Validate CalVer tag and package version
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          if [[ ! "$TAG" =~ ^v[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Release tag must use CalVer format: vYYYY.M.D[-suffix]"
            exit 1
          fi

          python - <<'PY'
          import os
          import re
          import tomllib

          tag = os.environ["GITHUB_REF_NAME"]
          version = tag[1:]

          with open("pyproject.toml", "rb") as fh:
              pyproject = tomllib.load(fh)
          package_name = pyproject["project"]["name"]

          with open("src/promptcrab/__about__.py", encoding="utf-8") as fh:
              about_text = fh.read()
          match = re.search(r'__version__\s*=\s*"([^"]+)"', about_text)
          if not match:
              raise SystemExit("Could not read __version__ from src/promptcrab/__about__.py")
          source_version = match.group(1)

          if version != source_version:
              raise SystemExit(
                  f"Tag version {version} does not match src/promptcrab/__about__.py version {source_version}"
              )

          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as fh:
              fh.write(f"package_name={package_name}\n")
              fh.write(f"version={version}\n")
              fh.write(f"tag={tag}\n")
          PY
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Validate release artifact
        run: ./scripts/release_check.sh

      - name: Render release notes
        run: |
          uv run python scripts/render_release_notes.py \
            --version "${{ steps.meta.outputs.version }}" \
            --output .release-notes.md

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "GitHub release already exists for ${{ steps.meta.outputs.tag }}"
          else
            gh release create "${{ steps.meta.outputs.tag }}" dist/* \
              --title "${{ steps.meta.outputs.tag }}" \
              --notes-file .release-notes.md \
              --verify-tag
          fi
