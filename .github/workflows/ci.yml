name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-package:
    name: Build, Test, Package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Run lint
        run: uv run ruff check .

      - name: Run type checks
        run: uv run pyright

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build

      - name: Check package metadata
        run: uv run twine check dist/*

      - name: Smoke test built CLI
        shell: bash
        run: |
          WHEEL_PATH="$(ls dist/*.whl)"
          uv tool run --from "$WHEEL_PATH" promptcrab --help
